<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub V2 Development</title>

    <style>
        :root {
            --bg-color: #0d1117;
            --card-color: #161b22;
            --accent: #58a6ff;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            font-family: "Segoe UI", Arial, Helvetica, sans-serif;
            color: white;
        }

        .container {
            background: var(--card-color);
            padding: 50px 60px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 40px rgba(88, 166, 255, 0.15);
            border: 1px solid rgba(88, 166, 255, 0.2);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 2.5rem;
            color: var(--accent);
        }

        p {
            margin: 0 0 30px 0;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            color: var(--bg-color);
            background: var(--accent);
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #79c0ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.4);
        }

        footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub V2 Development</h1>
        <p>GITHUB V2 DEVELOPMENT IN PROGRESS</p>

        <a href="https://ac1dst4r.github.io/GitChatV1/" 
           target="_blank" 
           class="btn">
           Visit GitChat V1
        </a>

        <footer>
            Thank you for your patience ✨
        </footer>
    </div>
</body>
</html>

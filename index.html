<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🔥 GitChat V3</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#36393f;
  color:white;
  display:flex;
  height:100vh;
}

/* Sidebar */
#sidebar {
  width:220px;
  background:#2f3136;
  padding:15px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}

#sidebar h2 { margin-top:0; }

button {
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:#5865F2;
  color:white;
}

.small-btn {
  background:#444;
  font-size:12px;
}

/* Main Chat */
#main {
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages {
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.message {
  margin-bottom:8px;
}

.username {
  font-weight:bold;
}

#chatInputArea {
  padding:10px;
  background:#40444b;
  display:flex;
}

#chatInputArea input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
}

/* Auth Screen */
#authScreen {
  margin:auto;
  text-align:center;
}

input {
  padding:8px;
  margin:5px;
  border-radius:5px;
  border:none;
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <h1>🔥 GitChat V3</h1>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button><br><br>
  <button onclick="googleLogin()">Continue with Google</button><br><br>
  <button class="small-btn" onclick="guestLogin()">Continue as Guest</button>
</div>

<!-- APP -->
<div id="app" style="display:none; width:100%;">
  
  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2>Rooms</h2>
    <input type="text" id="roomInput" placeholder="Room name">
    <button onclick="joinRoom()">Join</button>

    <hr>
    <button onclick="toggleSettings()">⚙ Settings</button>
    <button class="small-btn" onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="messages"></div>
    <div id="chatInputArea">
      <input type="text" id="messageInput" placeholder="Type message..."
      onkeydown="if(event.key==='Enter') sendMessage()">
    </div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" style="display:none; position:fixed; right:20px; top:20px; background:#2f3136; padding:15px; border-radius:8px;">
  <h3>Settings</h3>
  <input type="text" id="displayNameInput" placeholder="Display Name"><br>
  <input type="color" id="colorInput"><br>
  <button onclick="saveSettings()">Save</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  signInAnonymously,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyAME65WaAba-_8WWm2mrHCEnR8feiyUiKs",
  authDomain: "gitchat-backend-v2.firebaseapp.com",
  projectId: "gitchat-backend-v2",
  storageBucket: "gitchat-backend-v2.firebasestorage.app",
  messagingSenderId: "1082807018532",
  appId: "1:1082807018532:web:cab8abe0d41097b33fe4b1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentRoom = "";
let displayName = "";
let usernameColor = "#00d4ff";


/* 🔐 AUTH */

window.login = async () => {
  await signInWithEmailAndPassword(auth,
    email.value, password.value);
};

window.register = async () => {
  await createUserWithEmailAndPassword(auth,
    email.value, password.value);
};

window.googleLogin = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

window.guestLogin = async () => {
  await signInAnonymously(auth);
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  currentUser = user;

  if (user.isAnonymous) {
    displayName = "GUEST" + Math.floor(1000 + Math.random() * 9000);
  } else {
    displayName = user.email.split("@")[0];
  }

  await loadUserSettings();

  authScreen.style.display = "none";
  app.style.display = "flex";
});


/* ⚙ SETTINGS */

async function loadUserSettings() {
  const ref = doc(db, "users", currentUser.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    displayName = snap.data().displayName || displayName;
    usernameColor = snap.data().color || usernameColor;
  }
}

window.saveSettings = async () => {
  displayName = displayNameInput.value || displayName;
  usernameColor = colorInput.value;

  await setDoc(doc(db, "users", currentUser.uid), {
    displayName,
    color: usernameColor
  });

  alert("Saved!");
};

window.toggleSettings = () => {
  settingsPanel.style.display =
    settingsPanel.style.display === "none" ? "block" : "none";
};


/* 💬 CHAT */

window.joinRoom = () => {
  currentRoom = roomInput.value.trim();
  if (!currentRoom) return;

  const messagesRef = collection(db, "rooms", currentRoom, "messages");
  const q = query(messagesRef, orderBy("timestamp"));

  onSnapshot(q, (snapshot) => {
    messages.innerHTML = "";
    snapshot.forEach(doc => {
      const msg = doc.data();
      messages.innerHTML += `
        <div class="message">
          <span class="username" style="color:${msg.color}">
          ${msg.username}
          </span>: ${msg.text}
        </div>`;
    });
    messages.scrollTop = messages.scrollHeight;
  });
};

window.sendMessage = async () => {
  if (!messageInput.value.trim()) return;

  await addDoc(collection(db, "rooms", currentRoom, "messages"), {
    username: displayName,
    color: usernameColor,
    text: messageInput.value,
    timestamp: Date.now()
  });

  messageInput.value = "";
};

</script>

</body>
</html>
